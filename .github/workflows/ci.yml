name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run frontend checks
        run: nix develop -c make check

      - name: Install Playwright browsers
        run: nix develop -c make e2e-install

      - name: Run Playwright tests
        run: nix develop -c make e2e

      - name: Publish Playwright test report
        if: ${{ always() && hashFiles('test-results/junit.xml') != '' }}
        uses: dorny/test-reporter@v1
        with:
          name: Playwright
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Summarize Playwright results
        if: ${{ always() && hashFiles('test-results/junit.xml') != '' }}
        run: |
          node <<'NODE'
          const { readFileSync, appendFileSync } = require('node:fs')

          const junit = readFileSync('test-results/junit.xml', 'utf8')
          const attrs = Object.fromEntries(
            [...junit.matchAll(/\b(tests|failures|errors|skipped)="(\d+)"/g)]
              .map(([, key, value]) => [key, Number(value)])
          )
          const testcaseRows = [...junit.matchAll(/<testcase\b([^>]*)>([\s\S]*?)<\/testcase>|<testcase\b([^>]*)\/>/g)]
            .map((match) => {
              const attrsText = match[1] || match[3] || ''
              const body = match[2] || ''
              const testcaseAttrs = Object.fromEntries(
                [...attrsText.matchAll(/\b(name|classname|time)="([^"]*)"/g)]
                  .map(([, key, value]) => [key, value])
              )
              const status = body.includes('<failure')
                ? 'failed'
                : body.includes('<error')
                  ? 'error'
                  : body.includes('<skipped')
                    ? 'skipped'
                    : 'passed'

              return `| ${status} | ${testcaseAttrs.name || 'unknown'} | ${testcaseAttrs.time || '0'}s |`
            })
          const passed =
            (attrs.tests || 0) -
            (attrs.failures || 0) -
            (attrs.errors || 0) -
            (attrs.skipped || 0)

          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## Playwright',
              '',
              '| Result | Count |',
              '| --- | ---: |',
              `| Passed | ${passed} |`,
              `| Failed | ${(attrs.failures || 0) + (attrs.errors || 0)} |`,
              `| Skipped | ${attrs.skipped || 0} |`,
              `| Total | ${attrs.tests || 0} |`,
              '',
              '### Test Cases',
              '',
              '| Status | Test | Duration |',
              '| --- | --- | ---: |',
              ...testcaseRows,
              '',
              'Download the `playwright-report` artifact for the HTML report and traces. Traces can be replayed from the report, or with `npx playwright show-trace` after downloading the artifact.',
              '',
            ].join('\n')
          )
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
