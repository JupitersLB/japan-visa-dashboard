name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run frontend checks
        run: nix develop -c make check

      - name: Install Playwright browsers
        run: nix develop -c make e2e-install

      - name: Run Playwright tests
        run: nix develop -c make e2e

      - name: Summarize Playwright results
        if: always()
        run: |
          if [ ! -f test-results/junit.xml ]; then
            exit 0
          fi

          node <<'NODE'
          const { readFileSync, appendFileSync } = require('node:fs')

          const junit = readFileSync('test-results/junit.xml', 'utf8')
          const attrs = Object.fromEntries(
            [...junit.matchAll(/\b(tests|failures|errors|skipped)="(\d+)"/g)]
              .map(([, key, value]) => [key, Number(value)])
          )
          const passed =
            (attrs.tests || 0) -
            (attrs.failures || 0) -
            (attrs.errors || 0) -
            (attrs.skipped || 0)

          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## Playwright',
              '',
              '| Result | Count |',
              '| --- | ---: |',
              `| Passed | ${passed} |`,
              `| Failed | ${(attrs.failures || 0) + (attrs.errors || 0)} |`,
              `| Skipped | ${attrs.skipped || 0} |`,
              `| Total | ${attrs.tests || 0} |`,
              '',
            ].join('\n')
          )
          NODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
