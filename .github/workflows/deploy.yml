name: Deploy

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Nix
        uses: ./.github/actions/setup-nix

      - name: Install dependencies
        run: nix develop -c make deps

      - name: Run frontend checks
        run: nix develop -c make check

      - name: Install Playwright browsers
        run: nix develop -c make e2e-install

      - name: Run production Playwright tests
        run: nix develop -c make e2e-prod

      - name: Publish production Playwright test report
        if: ${{ always() && hashFiles('test-results/junit.xml') != '' }}
        uses: dorny/test-reporter@v1
        with:
          name: Playwright production
          path: test-results/junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload production Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-production-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: japan-visa-predictions

      - name: Configure Docker for Google Container Registry
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Set up SOPS Age key
        uses: ./.github/actions/setup-sops-age
        with:
          age-key: ${{ secrets.CI_AGE_KEY }}

      - name: Deploy public Cloud Run service
        env:
          SOPS_AGE_KEY_FILE: ./keys.txt
        run: nix develop -c make deploy IMAGE_TAG=${{ github.ref_name }}

      - name: Prune old registry images
        continue-on-error: true
        run: nix develop -c make registry-prune-apply

      - name: Load Slack webhook
        id: slack-webhook
        env:
          CONFIGURED_SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || vars.SLACK_WEBHOOK_URL }}
        run: |
          if [ -n "$CONFIGURED_SLACK_WEBHOOK_URL" ]; then
            slack_webhook_url="$CONFIGURED_SLACK_WEBHOOK_URL"
          else
            set -a
            . ./.env
            set +a
            slack_webhook_url="${SLACK_WEBHOOK_URL:-}"
          fi

          if [ -z "$slack_webhook_url" ]; then
            echo "::error::SLACK_WEBHOOK_URL is not configured. Add it to the encrypted deployment .env, or as a GitHub Actions secret or variable."
            exit 1
          fi

          echo "::add-mask::$slack_webhook_url"
          echo "url=$slack_webhook_url" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of successful deployment
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ steps.slack-webhook.outputs.url }}
          webhook-type: incoming-webhook
          payload: |
            text: "Deployment successful for ${{ github.repository }} ${{ github.ref_name }}"
            blocks:
              - type: "section"
                text:
                  type: "mrkdwn"
                  text: "*:white_check_mark: Deployment successful*\n*Repository:* ${{ github.repository }}\n*Tag:* ${{ github.ref_name }}\n*Triggered by:* ${{ github.actor }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|GitHub Actions>"
